name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#.git" || true
        # Soft-fail on style — surfaces output without blocking the matrix.
        # Tighten by removing the `|| true` once the corpus stabilizes.

      - name: Validate SKILL frontmatter
        run: bash tests/lib/validate-frontmatter.sh skills

      - name: Shellcheck the harness scripts
        run: |
          shellcheck -S warning \
            tests/run-fixtures.sh \
            tests/lib/extract-bash.sh \
            tests/lib/validate-frontmatter.sh

      - name: Extract bash blocks from SKILL files (parse-only sanity check)
        # The bash inside SKILL.md and profile files is documentation —
        # the model invokes pieces of it under varying conditions. We
        # check syntax (bash -n) but not lint, because the fragments
        # reference variables defined across blocks.
        run: |
          status=0
          for f in skills/dishonest-code-audit/SKILL.md \
                   skills/stub-audit/SKILL.md \
                   skills/stub-audit/profiles/*.md \
                   skills/stub-audit/profiles/frameworks/*.md; do
            if ! bash tests/lib/extract-bash.sh "$f" | bash -n; then
              echo "FAIL: bash block in $f does not parse" >&2
              status=1
            fi
          done
          exit "$status"

      - name: Fixture mechanical-sweep harness
        run: bash tests/run-fixtures.sh
